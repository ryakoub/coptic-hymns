<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
<style>
.hymn-button { background: linear-gradient(to bottom, #FFB6C1, #FF69B4); }
</style>
</head>
<body>
<nav class="nav-bar"><a href="index.html">🏠 Home</a><a href="groups.html?curriculum=mahragan-keraza-2026">📚 Groups</a></nav>
<h1>Coptic Hymns</h1>
<h2 id="levelTitle">Hymns</h2>
<div id="hymnList"></div>
<script>
const params = new URLSearchParams(window.location.search);
const group = params.get("group") || "grades-3-4";
const level = params.get("level") || "level-1";

document.getElementById("levelTitle").innerText = group.replace(/-/g, " ").toUpperCase() + " - " + level.replace(/-/g, " ").toUpperCase();

const hymns = {
  "grades-3-4": {
    "level-1": [
      { id: "gospel-response-feast-cross", title: "Gospel Response of the Feast of the Cross" },
      { id: "censer-annual",               title: "The Golden Censer" },
      { id: "ton-syna",                    title: "ⲧⲟⲛ ⲥⲩⲛⲁ" },
      { id: "doxology-st-mary-vespers",    title: "Doxology of St. Mary Vespers" },
    ],
    "level-2": [
      { id: "second-doxology-apostles",          title: "The Second Doxology of the Apostles" },
      { id: "psalm-150-4th-hoos",                title: "Psalm 150, 4th Hoos" },
      { id: "paralex-of-resurrection",           title: "Paralex of Resurrection" },
      { id: "distribution-refrain-resurrection", title: "Distribution Refrain for Resurrection" },
    ]
  }
};

const list = hymns[group]?.[level] || [];
const container = document.getElementById("hymnList");

if (list.length === 0) {
  container.innerHTML = "<p>No hymns found for this level.</p>";
} else {
  list.forEach(h => {
    const a = document.createElement("a");
    a.className = "button hymn-button";
    a.href = `player.html?hymn=${h.id}&group=${group}&level=${level}`;
    a.textContent = "🎼 " + h.title;
    container.appendChild(a);
  });
}
</script>
</body>
</html>
