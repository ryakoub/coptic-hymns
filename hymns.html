<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
<style>
.hymn-button { background: linear-gradient(to bottom, #FFB6C1, #FF69B4); }
</style>
</head>
<body>
<nav class="nav-bar"><a href="index.html">🏠 Home</a><a href="groups.html?curriculum=mahragan-keraza-2026">📚 Groups</a></nav>
<h1>Coptic Hymns</h1>
<h2 id="levelTitle">Hymns</h2>
<div id="hymnList"></div>
<script>
const params = new URLSearchParams(window.location.search);
const group = params.get("group") || "grades-3-4";
const level = params.get("level") || "level-1";

document.getElementById("levelTitle").innerText = group.replace(/-/g, " ").toUpperCase() + " - " + level.replace(/-/g, " ").toUpperCase();

const hymns = {
  "kg": {
    "level-1": [
      { id: "concluding-canon-feast-cross",              title: "Concluding Canon for Feast of the Cross" },
      { id: "sotees-ameen-fast",                         title: "Sotees Ameen (Fast)" },
      { id: "psalm-response-resurrection",               title: "Psalm Response, Resurrection" },
    ],
    "level-2": [
      { id: "ere-po-esmo-may-their-holy-blessing",       title: "Ere Po Esmo (May Their Holy Blessing)" },
      { id: "liturgy-gospel-response-annual",            title: "Liturgy Gospel Response, Annual" },
      { id: "hiten-archangel-michael-feast-resurrection", title: "Hiten for Archangel Michael, Feast of Resurrection" },
    ]
  },
  "grades-1-2": {
    "level-1": [
      { id: "procession-refrain-feast-cross",      title: "Procession Refrain, Feast of the Cross" },
      { id: "this-is-the-day",                     title: "This Is the Day" },
      { id: "conclusion-canon-resurrection",       title: "Conclusion Canon, Resurrection" },
      { id: "blessed-pentecost",                   title: "Blessed, Pentecost" },
    ],
    "level-2": [
      { id: "the-thought-of-man",                  title: "The Thought of Man" },
      { id: "st-mark-doxology-first-one",          title: "St. Mark Doxology (First One)" },
      { id: "verses-cymbals-resurrection",         title: "Verses of Cymbals, Resurrection" },
      { id: "liturgy-gospel-response-resurrection",title: "Liturgy Gospel Response, Resurrection" },
    ]
  },
  "grades-3-4": {
    "level-1": [
      { id: "gospel-response-feast-cross", title: "Gospel Response of the Feast of the Cross" },
      { id: "censer-annual",               title: "The Golden Censer" },
      { id: "ton-syna",                    title: "ⲧⲟⲛ ⲥⲩⲛⲁ" },
      { id: "doxology-st-mary-vespers",    title: "Doxology of St. Mary Vespers" },
    ],
    "level-2": [
      { id: "second-doxology-apostles",          title: "The Second Doxology of the Apostles" },
      { id: "psalm-150-4th-hoos",                title: "Psalm 150, 4th Hoos" },
      { id: "paralex-of-resurrection",           title: "Paralex of Resurrection" },
      { id: "distribution-refrain-resurrection", title: "Distribution Refrain for Resurrection" },
    ]
  },
  "grades-5-6": {
    "level-1": [
      { id: "verse-cymbals-feast-cross",    title: "Verse of Cymbals for Feast of the Cross" },
      { id: "doxology-st-mary-matins",      title: "Doxology of St. Mary, Matins" },
      { id: "praxis-response-annual",       title: "Praxis Response, Annual" },
      { id: "doxology-resurrection",        title: "Doxology of Resurrection" },
      { id: "conclusion-midnight-praises",  title: "Conclusion of Midnight Praises" },
    ],
    "level-2": [
      { id: "doxology-heavenly-orders",                     title: "Doxology of Heavenly Orders" },
      { id: "anaphora-responses-st-basil-st-gregory-liturgies", title: "Anaphora Responses of St. Basil and St. Gregory Liturgies" },
      { id: "verse-cymbals-resurrection",                   title: "Verse of Cymbals for Resurrection" },
      { id: "praxis-response-resurrection",                 title: "Praxis Response for Resurrection" },
    ]
  },
  "ms": {
    "level-1": [
      { id: "refrain-third-hour-pentecost",  title: "Refrain of Third Hour, Pentecost" },
      { id: "praxis-response-feast-cross",   title: "Praxis Response, Feast of the Cross" },
      { id: "hymn-of-the-blessing",          title: "The Hymn of the Blessing" },
      { id: "lobsh-first-hoos",              title: "Lobsh of First Hoos" },
      { id: "christ-is-risen",               title: "Christ Is Risen" },
    ],
    "level-2": [
      { id: "paralex-shere-ne-maria",        title: "Paralex, Shere Ne Maria" },
      { id: "aripalin",                      title: "Ⲁⲣⲓⲯⲁⲗⲓⲛ" },
      { id: "aspasmos-adam-resurrection",    title: "Aspasmos Adam, Resurrection" },
    ]
  }
};

const list = hymns[group]?.[level] || [];
const container = document.getElementById("hymnList");

if (list.length === 0) {
  container.innerHTML = "<p>No hymns found for this level.</p>";
} else {
  list.forEach(h => {
    const a = document.createElement("a");
    a.className = "button hymn-button";
    a.href = `player.html?hymn=${h.id}&group=${group}&level=${level}`;
    a.textContent = "🎼 " + h.title;
    container.appendChild(a);
  });
}
</script>
</body>
</html>
