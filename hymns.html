<!DOCTYPE html>
<html>
<head>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<meta property="og:title" content="Coptic Chanter" />

<body>
<nav class="nav-bar"><a href="index.html">🏠 Home</a><div class="nav-brand"><span class="nav-brand-title">Coptic Chanter</span><span class="nav-brand-subtitle">Ⲁⲣⲓⲯⲁⲗⲓⲛ ϧⲉⲛ ⲛⲓϩⲩⲙⲛⲟⲥ</span></div><a href="groups.html?curriculum=mahragan-keraza-2026">📚 Groups</a></nav>
<main class="page-shell">
<h1>Coptic Hymns</h1>
<h2 id="levelTitle">Hymns</h2>
<div id="hymnList"></div>
</main>
<script src="js/hymns-data.js?v=20260421a"></script>
<script>
const params = new URLSearchParams(window.location.search);
const group = params.get("group") || "grades-3-4";
const level = params.get("level") || "level-1";

const groupTitle = group === "college"
  ? "COLLEGE & UP"
  : group.replace(/-/g, " ").toUpperCase();
const levelTitle = level.replace(/-/g, " ").toUpperCase();
document.getElementById("levelTitle").innerText = groupTitle + " - " + levelTitle;
document.title = `${groupTitle} ${levelTitle} Hymns | Coptic Chanter`;

const hymns = window.HYMNS_DATA || {};

const list = hymns[group]?.[level] || [];
const container = document.getElementById("hymnList");

if (list.length === 0) {
  container.innerHTML = "<p>No hymns found for this level.</p>";
} else {
  list.forEach(h => {
    const a = document.createElement("a");
    a.className = "button hymn-button";
    a.href = `player.html?hymn=${h.id}&group=${group}&level=${level}`;
    a.textContent = "🎼 " + h.title;
    container.appendChild(a);
  });
}
</script>
</body>
</html>
