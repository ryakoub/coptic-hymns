<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
<style>
.level1 { background: linear-gradient(to bottom, #FFDAB9, #FFA07A); }
.level2 { background: linear-gradient(to bottom, #E6E6FA, #DDA0DD); }
</style>
</head>
<body>
<nav class="nav-bar"><a href="index.html">🏠 Home</a><a href="hymns.html">🎵 Hymn List</a></nav>
<h1>Coptic Hymns</h1>
<h2 id="groupTitle">Select Level</h2>
<a class="button level1" href="#" id="level1Link">🎵 Level 1</a>
<a class="button level2" href="#" id="level2Link">🎶 Level 2</a>
<script>
const params = new URLSearchParams(window.location.search);
const curriculum = params.get("curriculum");
const group = params.get("group");
document.getElementById("groupTitle").innerText = group.replace("-", " ").toUpperCase();
document.getElementById("level1Link").href = `hymns.html?curriculum=${curriculum}&group=${group}&level=level-1`;
document.getElementById("level2Link").href = `hymns.html?curriculum=${curriculum}&group=${group}&level=level-2`;
</script>
</body>
</html>
