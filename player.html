<main class="page-shell">
<h1>🎵 Coptic Hymns</h1>

<h2 id="title">Loading...</h2>
<p id="subtitle" style="text-align:center; font-size:0.85em; color:#1a5276; margin-top:-8px; font-weight:600;"></p>

<div class="audio-nav"><audio id="audio" controls></audio></div>

<div id="settingsScrim" class="settings-scrim" hidden></div>
<aside id="settingsPanel" class="settings-drawer" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" aria-hidden="true" hidden>
	<header class="settings-drawer-header">
		<h2 id="settingsTitle" class="settings-drawer-title">Settings</h2>
		<button id="closeSettings" class="settings-drawer-close" type="button" aria-label="Close settings">✕</button>
	</header>
	<div class="settings-drawer-body">
		<ul class="settings-list" role="list">
			<li>
				<button id="toggleLoop" class="settings-row" type="button" role="switch" aria-checked="false" data-setting="repeatVerse">
					<span class="settings-row-icon" aria-hidden="true">🔁</span>
					<span class="settings-row-text">
						<span class="settings-row-label">Repeat Verse</span>
						<span class="settings-row-value" data-on="On" data-off="Off">Off</span>
					</span>
					<span class="settings-row-check" aria-hidden="true">✓</span>
				</button>
			</li>
			<li>
				<button id="togglePulse" class="settings-row" type="button" role="switch" aria-checked="false" data-setting="pulse">
					<span class="settings-row-icon" aria-hidden="true">💓</span>
					<span class="settings-row-text">
						<span class="settings-row-label">Pulse</span>
						<span class="settings-row-value" data-on="On" data-off="Off">Off</span>
					</span>
					<span class="settings-row-check" aria-hidden="true">✓</span>
				</button>
			</li>
			<li>
				<button id="toggleScroll" class="settings-row is-on" type="button" role="switch" aria-checked="true" data-setting="autoScroll">
					<span class="settings-row-icon" aria-hidden="true">📜</span>
					<span class="settings-row-text">
						<span class="settings-row-label">Auto-Scroll</span>
						<span class="settings-row-value" data-on="On" data-off="Off">On</span>
					</span>
					<span class="settings-row-check" aria-hidden="true">✓</span>
				</button>
			</li>
			<li>
				<button id="toggleCopticFont" class="settings-row" type="button" role="switch" aria-checked="false" data-setting="copticFontTraditional">
					<span class="settings-row-icon" aria-hidden="true">Ⲁ</span>
					<span class="settings-row-text">
						<span class="settings-row-label">Traditional Coptic Font</span>
						<span class="settings-row-value" data-on="Traditional" data-off="Modern">Modern</span>
					</span>
					<span class="settings-row-check" aria-hidden="true">✓</span>
				</button>
			</li>
		</ul>

		<button id="toggleAdvanced" class="settings-advanced-toggle" type="button" aria-expanded="false" aria-controls="advancedPanel">
			<span>Advanced Options</span>
			<span class="settings-advanced-caret" aria-hidden="true">▾</span>
		</button>
		<div id="advancedPanel" class="settings-advanced-panel" hidden>
			<div id="timestamps" class="timestamps-panel">Timestamps: press T while audio plays</div>
		</div>
	</div>
</aside>

<p><a id="youtubeLink" href="#" target="_blank" style="color: #1976d2; text-decoration: none; font-weight: bold;">📺 Watch Original Video</a></p>
<p id="sheetMusicLinkWrap" hidden><a id="sheetMusicLink" href="#" target="_blank" style="color: #1976d2; text-decoration: none; font-weight: bold;">🎼 View Sheet Music</a></p>

</main>
